spring:
  application:
    name: CatalogueManagement

  datasource:
    url: jdbc:postgresql://localhost:5432/cataloguemanagement
    driverClassName: org.postgresql.Driver
    username: postgres
    password: postgres

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update

  graphql:
    schema:
      locations: classpath:graphql/
    path: /graphql

otel:
  #exporter
  exporter:
    otlp:
      endpoint: http://localhost:4317
      protocol: grpc

  #disable logs only export traces and metrics
  logs:
    exporter: none

  # Resource attributes (tags for the service)
  resource:
    attributes:
      service.name: CatalogueManagement

  # Traces configuration
  traces:
    sampler: always_on

